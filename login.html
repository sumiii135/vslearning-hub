<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VS Learning Hub</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#000000,#12001f,#000000);
    overflow:hidden;
}

/* Animated Background */
body::before{
    content:'';
    position:absolute;
    width:200%;
    height:200%;
    background:
    radial-gradient(circle,#8a2be220 1px,transparent 1px);
    background-size:40px 40px;
    animation:moveBg 20s linear infinite;
}

@keyframes moveBg{
    from{transform:translate(0,0);}
    to{transform:translate(-200px,-200px);}
}

.login-box{
    position:relative;
    z-index:10;
    width:380px;
    padding:40px;
    background:rgba(0,0,0,.75);
    backdrop-filter:blur(10px);
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 30px #8a2be2;
}

.ghost{
    font-size:60px;
    animation:float 3s ease-in-out infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-15px);}
}

.logo{
    color:#fff;
    font-size:32px;
    font-weight:bold;
    margin-top:10px;
    text-shadow:
    0 0 10px #8a2be2,
    0 0 20px #8a2be2;
}

.tagline{
    color:#bbb;
    margin:15px 0 25px;
}

.input-box{
    margin:12px 0;
}

.input-box input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#111;
    color:white;
    outline:none;
}

.input-box input:focus{
    box-shadow:0 0 10px #8a2be2;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#8a2be2;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.03);
    box-shadow:0 0 20px #8a2be2;
}

#error{
    color:#ff4d4d;
    margin-top:10px;
    display:none;
}

/* Dashboard */
#dashboard{
    display:none;
    position:absolute;
    inset:0;
    background:#050505;
    color:white;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

#dashboard h1{
    font-size:45px;
    text-shadow:0 0 15px #8a2be2;
}

#dashboard p{
    margin-top:10px;
    color:#ccc;
}
</style>
</head>

<body>

<div class="login-box" id="loginBox">

    <div class="ghost">👻</div>

    <div class="logo">VS Learning Hub</div>

    <div class="tagline">
        Enter The World Of Knowledge
    </div>

    <form onsubmit="login(event)">

        <div class="input-box">
            <input type="email"
            id="email"
            placeholder="Enter Email"
            required>
        </div>

        <div class="input-box">
            <input type="password"
            id="password"
            placeholder="25082005"
            required>
        </div>

        <button type="submit">
            👻 Enter Hub
        </button>

        <div id="error">
            Wrong Password!
        </div>

    </form>

</div>

<div id="dashboard">
    <h1>📚 VS Learning Hub</h1>
    <p>Knowledge Never Sleeps...</p>
</div>

<script>

function login(e){

e.preventDefault();

let password =
document.getElementById("password").value;

if(password==="25082005")

}

}

</script>

</body>
</html>
